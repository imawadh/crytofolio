# Render Blueprint for the CryptoPolio backend API.
# Deploy: push to GitHub, then create a new Blueprint on https://render.com
# pointing at this repo. Set DATABASE_URI and CLIENT_URL in the dashboard.
services:
  - type: web
    name: cryptopolio-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render generates a strong random secret on first deploy.
      - key: JWT_SECRET
        generateValue: true
      # Set these in the Render dashboard (marked sync:false so they are
      # not stored in this file).
      - key: DATABASE_URI
        sync: false
      - key: CLIENT_URL
        sync: false
